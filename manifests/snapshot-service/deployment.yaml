apiVersion: apps/v1
kind: Deployment
metadata:
  name: py-wallet-snapshot-service
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 50%
      maxUnavailable: 0%
  selector:
    matchLabels:
      app: py-wallet-snapshot-service
  template:
    metadata:
      labels:
        app: py-wallet-snapshot-service
    spec:
      serviceAccountName: py-wallet-snapshot-service
      terminationGracePeriodSeconds: 60
      containers:
        - name: py-wallet-snapshot-service
          image: ghcr.io/amysyutin/py_wallet-snapshot-service
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          envFrom:
            - secretRef:
                name: py-wallet-snapshot-service-secrets
            - configMapRef:
                name: snapshot-service-config
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
