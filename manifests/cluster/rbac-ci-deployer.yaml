apiVersion: v1
kind: ServiceAccount
metadata:
  name: ci-deployer
  namespace: py-wallet-dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ci-deployer-role
  namespace: py-wallet-dev
rules:
  - apiGroups: ["apps"]
    resources:
      - deployments
    verbs:
      - get
      - list
      - watch
      - patch

  - apiGroups: ["apps"]
    resources:
      - replicasets
    verbs:
      - get
      - list
      - watch

  - apiGroups: [""]
    resources:
      - pods
      - services
      - endpoints
      - events
      - configmaps
    verbs:
      - get
      - list
      - watch

  - apiGroups: [""]
    resources:
      - pods/log
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ci-deployer-binding
  namespace: py-wallet-dev
subjects:
  - kind: ServiceAccount
    name: ci-deployer
    namespace: py-wallet-dev
roleRef:
  kind: Role
  name: ci-deployer-role
  apiGroup: rbac.authorization.k8s.io