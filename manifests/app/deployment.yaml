apiVersion: apps/v1
kind: Deployment
metadata:
  name: py-wallet
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 50%        
      maxUnavailable: 0%
  selector:
    matchLabels:
      app: py-wallet
  template:
    metadata:
      labels:
        app: py-wallet
      annotations:
        pywallet.dev/config-revision: "snapshot-service-v1"
    spec:
      serviceAccountName: py-wallet
      terminationGracePeriodSeconds: 60
      containers:
        - name: py-wallet
          image: ghcr.io/amysyutin/py_wallet
          imagePullPolicy: Always
          ports: 
            - containerPort: 8000
          env:
            - name: APP_ENV
              value: "production"
          envFrom:
            - secretRef:
                name: py-wallet-secrets 
            - configMapRef:
                name: py-wallet-config
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi