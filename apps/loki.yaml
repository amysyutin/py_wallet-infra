apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana-community.github.io/helm-charts
    chart: loki
    targetRevision: "18.1.1"
    helm:
      releaseName: loki
      valuesObject:
        deploymentMode: Monolithic
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          schemaConfig:
            configs:
              - from: "2024-04-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h
          storage:
            type: filesystem
            bucketNames:
              chunks: loki-chunks
              ruler: loki-rules
              admin: loki-admin
          rulerConfig:
            storage:
              type: local
          limits_config:
            retention_period: 168h
            allow_structured_metadata: true
            volume_enabled: true
          compactor:
            retention_enabled: true
            working_directory: /var/loki/compactor
          ruler:
            enable_api: true
        singleBinary:
          replicas: 1
          persistence:
            enabled: true
            storageClass: local-path
            accessModes:
              - ReadWriteOnce
            size: 10Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0
        ingester:
          replicas: 0
        querier:
          replicas: 0
        queryFrontend:
          replicas: 0
        queryScheduler:
          replicas: 0
        distributor:
          replicas: 0
        compactor:
          replicas: 0
        indexGateway:
          replicas: 0
        bloomPlanner:
          replicas: 0
        bloomBuilder:
          replicas: 0
        bloomGateway:
          replicas: 0
        minio:
          enabled: false
        chunksCache:
          enabled: false
        resultsCache:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true