name: Open deploy PR

on:
  push:
    branches:
      - "deploy/**"

permissions:
  actions: write
  contents: read
  pull-requests: write

concurrency:
  group: open-deploy-pr-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  open-deploy-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Create deploy PR
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        shell: bash
        run: |
          set -euo pipefail

          case "${DEPLOY_BRANCH}" in
            deploy/py-wallet-front/*)
              component_prefix="deploy/py-wallet-front/"
              ;;
            deploy/py-wallet-snapshot-service/*)
              component_prefix="deploy/py-wallet-snapshot-service/"
              ;;
            deploy/py-wallet/*)
              component_prefix="deploy/py-wallet/"
              ;;
            *)
              echo "Unsupported deploy branch: ${DEPLOY_BRANCH}"
              exit 1
              ;;
          esac

          existing_pr=$(gh pr list \
            --repo "${REPOSITORY}" \
            --state open \
            --base main \
            --head "${DEPLOY_BRANCH}" \
            --json url \
            --jq '.[0].url // empty')

          if [[ -n "${existing_pr}" ]]; then
            pr_url="${existing_pr}"
          else
            pr_url=$(gh pr create \
              --repo "${REPOSITORY}" \
              --base main \
              --head "${DEPLOY_BRANCH}" \
              --title "${COMMIT_MESSAGE}" \
              --body "Automated validated image bump from ${DEPLOY_BRANCH}.")
          fi

          echo "Deploy PR: ${pr_url}"

          pr_number=$(gh pr view \
            --repo "${REPOSITORY}" \
            "${pr_url}" \
            --json number \
            --jq '.number')

          gh workflow run auto-merge.yml \
            --repo "${REPOSITORY}" \
            --ref main \
            --field pr_number="${pr_number}"

          gh pr list \
            --repo "${REPOSITORY}" \
            --state open \
            --base main \
            --json number,headRefName \
            --jq ".[] | select((.headRefName | startswith(\"${component_prefix}\")) and .headRefName != \"${DEPLOY_BRANCH}\") | .number" \
          | while read -r pr_number; do
              gh pr close \
                --repo "${REPOSITORY}" \
                "${pr_number}" \
                --comment "Superseded by ${pr_url}."
            done
