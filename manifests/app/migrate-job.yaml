apiVersion: batch/v1
kind: Job
metadata:
  name: py-wallet-migrate
  namespace: py-wallet-dev
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/amysyutin/py_wallet
          imagePullPolicy: Always
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - secretRef:
                name: py-wallet-secrets