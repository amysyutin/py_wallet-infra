apiVersion: v1
kind: ConfigMap
metadata:
  name: py-wallet-config
data:
  LOG_LEVEL: "INFO"
  RPC_URL_MAINNET: https://ethereum-rpc.publicnode.com
  RPC_URL_BASE: https://base.drpc.org
  RPC_URL_BNB: https://bsc.drpc.org
  RPC_URL_ARB: https://arbitrum-one-rpc.publicnode.com
  RPC_URL_LINEA: https://linea.drpc.org
  SNAPSHOT_SERVICE_URL: "http://py-wallet-snapshot-service:8001"
  SNAPSHOT_SCHEDULER_ENABLED: "false"
  SNAPSHOT_AUTO_ON_WALLET_CREATE: "true"
  TELEGRAM_BOT_USERNAME: "@py_WalletBot"
  TELEGRAM_MINI_APP_URL: "https://pywallet.dev/telegram"
  TELEGRAM_WEBHOOK_URL: "https://pywallet.dev/api/telegram/webhook"
  TELEGRAM_AUTH_MAX_AGE_SECONDS: "300"
  TELEGRAM_DAILY_BALANCE_ENABLED: "true"
  TELEGRAM_API_BASE_URL: "https://api.telegram.org"
  TELEGRAM_REQUEST_TIMEOUT_SECONDS: "10"
