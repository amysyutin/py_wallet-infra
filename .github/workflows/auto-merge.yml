name: Auto-merge PR

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to validate and merge
        required: true
        type: number

jobs:
  validate-manifests:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    env:
      KUSTOMIZE_VERSION: v5.8.1
      KUSTOMIZE_SHA256: 029a7f0f4e1932c52a0476cf02a0fd855c0bb85694b82c338fc648dcb53a819d
      KUBECONFORM_VERSION: v0.7.0
      KUBECONFORM_SHA256: c31518ddd122663b3f3aa874cfe8178cb0988de944f29c74a0b9260920d115d3
      CRD_CATALOG_REF: 34cef0fc2698bbb611f475515e555a2d7ca85b6c

    steps:
      - name: Validate dispatched deploy PR
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" \
            --jq 'select(.state == "open" and .draft == false and .head.repo.full_name == .base.repo.full_name and (.head.ref | startswith("deploy/"))) | .number' \
          | grep -qx "${PR_NUMBER}"

      - name: Checkout pull request
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/pull/{0}/head', inputs.pr_number) || github.event.pull_request.head.sha }}

      - name: Install pinned manifest tools
        shell: bash
        run: |
          set -euo pipefail

          curl -fsSL \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" \
            -o "${RUNNER_TEMP}/kustomize.tar.gz"
          echo "${KUSTOMIZE_SHA256}  ${RUNNER_TEMP}/kustomize.tar.gz" | sha256sum -c -
          tar -xzf "${RUNNER_TEMP}/kustomize.tar.gz" -C "${RUNNER_TEMP}" kustomize

          curl -fsSL \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            -o "${RUNNER_TEMP}/kubeconform.tar.gz"
          echo "${KUBECONFORM_SHA256}  ${RUNNER_TEMP}/kubeconform.tar.gz" | sha256sum -c -
          tar -xzf "${RUNNER_TEMP}/kubeconform.tar.gz" -C "${RUNNER_TEMP}" kubeconform
          echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"

      - name: Render Kustomize roots
        run: scripts/render-manifests.sh "${RUNNER_TEMP}/rendered"

      - name: Validate Kubernetes and CRD schemas
        shell: bash
        run: |
          kubeconform \
            -strict \
            -summary \
            -schema-location default \
            -schema-location "https://raw.githubusercontent.com/datreeio/CRDs-catalog/${CRD_CATALOG_REF}/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json" \
            "${RUNNER_TEMP}/rendered" \
            apps \
            bootstrap

      - name: Enforce repository manifest policy
        run: scripts/check-manifest-policy.sh "${RUNNER_TEMP}/rendered"

  enable-auto-merge:
    needs: validate-manifests
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Enable squash auto-merge
        if: github.event_name == 'pull_request_target'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"

      - name: Merge validated deploy PR
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPOSITORY: ${{ github.repository }}
        run: gh pr merge --repo "${REPOSITORY}" --squash --delete-branch "${PR_NUMBER}"
