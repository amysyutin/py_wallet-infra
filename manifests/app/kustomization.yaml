apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: py-wallet-dev

commonAnnotations:
  app.kubernetes.io/managed-by: kustomize

images:
  - name: ghcr.io/amysyutin/py_wallet
    newTag: latest

labels:
  - includeSelectors: false
    includeTemplates: true
    pairs:
      app.kubernetes.io/name: py-wallet
      app.kubernetes.io/part-of: py-wallet
      app.kubernetes.io/environment: dev

resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - certificate.yaml
  - middleware-redirect-https.yaml
  - configmap.yaml
  - migrate-job.yaml