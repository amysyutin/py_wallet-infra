apiVersion: apps/v1
kind: Deployment
metadata:
  name: py-wallet-front
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: py-wallet-front
  template:
    metadata:
      labels:
        app: py-wallet-front
    spec:
      serviceAccountName: py-wallet-front
      automountServiceAccountToken: false
      containers:
        - name: py-wallet-front
          image: ghcr.io/amysyutin/py_wallet-front
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi

