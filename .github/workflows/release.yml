name: Product Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout tagged source
        uses: actions/checkout@v6

      - name: Validate product release
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          file_version="$(tr -d '[:space:]' < VERSION)"
          manifest="releases/${GITHUB_REF_NAME}.yaml"
          [[ "${tag_version}" =~ ^0\.[0-9]+\.[0-9]+$|^[1-9][0-9]*\.[0-9]+\.[0-9]+$ ]]
          test "${tag_version}" = "${file_version}"
          test -f "${manifest}"
          grep -Eq '^  status: released$' "${manifest}"
          grep -Eq "^  version: ${tag_version}$" "${manifest}"
          grep -Eq '^  releasedAt: [0-9]{4}-[0-9]{2}-[0-9]{2}$' "${manifest}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "releases/${GITHUB_REF_NAME}.yaml#Product release manifest" \
            --verify-tag \
            --generate-notes
